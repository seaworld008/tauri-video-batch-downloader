name: Feature request
description: Suggest a capability, workflow, protocol, or UX improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
      placeholder: When downloading a batch of videos, I need ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, or API you expect.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important for my workflow
        - Blocking adoption
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or designs you tried.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, sample data shape, or related issues.
