name: Security Audit

on:
  # Run on pushes to main branch
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.txt"
      - "LICENSE*"

  # Run on pull requests targeting main
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.txt"
      - "LICENSE*"

  # Run weekly on Sundays at 02:00 UTC
  schedule:
    - cron: "0 2 * * 0"

  # Allow manual trigger
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Rust Security Audit
  rust-security:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      # Run cargo audit for security vulnerabilities
      - name: Run security audit
        id: audit
        run: |
          cd src-tauri
          echo "## Security Audit Results" > ../audit-results.md
          echo "" >> ../audit-results.md

          cargo audit --json > audit.json 2>&1 || true

          python - <<'PY'
          import json
          from pathlib import Path

          audit_path = Path("audit.json")
          report_path = Path("../audit-results.md")

          data = json.loads(audit_path.read_text(encoding="utf-8"))
          vulnerabilities = data.get("vulnerabilities", {}).get("list", [])
          warnings = data.get("warnings", {})

          with report_path.open("a", encoding="utf-8") as report:
              if vulnerabilities:
                  report.write("⚠️  Security vulnerabilities detected:\n\n")
                  for vuln in vulnerabilities:
                      advisory = vuln.get("advisory", {})
                      report.write(f"Crate:     {advisory.get('package', '<unknown>')}\n")
                      report.write(f"Version:   {vuln.get('versions', {}).get('patched') or vuln.get('versions', {}).get('patched_versions') or '<unknown>'}\n")
                      report.write(f"Title:     {advisory.get('title', '<unknown>')}\n")
                      report.write(f"ID:        {advisory.get('id', '<unknown>')}\n")
                      report.write(f"URL:       {advisory.get('url', '<unknown>')}\n")
                      report.write(f"Solution:  {advisory.get('solution', '<none>')}\n\n")
              else:
                  report.write("✅ No known security vulnerabilities found\n")

              unmaintained = warnings.get("unmaintained", [])
              if unmaintained:
                  report.write("## Non-blocking Maintenance Warnings\n\n")
                  for item in unmaintained:
                      report.write(
                          f"- {item.get('advisory', {}).get('id', '<unknown>')}: "
                          f"{item.get('advisory', {}).get('title', '<unknown>')}\n"
                      )
          PY

          if python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("audit.json").read_text(encoding="utf-8"))
          raise SystemExit(0 if not data.get("vulnerabilities", {}).get("list") else 1)
          PY
          then
            echo "✅ No known security vulnerabilities found" >> ../audit-results.md
            echo "security_status=clean" >> $GITHUB_OUTPUT
          else
            echo "security_status=vulnerabilities" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # Check licenses compatibility
      - name: Check licenses
        id: licenses
        run: |
          cd src-tauri
          echo "" >> ../audit-results.md
          echo "## License Audit Results" >> ../audit-results.md
          echo "" >> ../audit-results.md

          if cargo deny --log-level error check licenses > licenses.log 2>&1; then
            echo "✅ All licenses are compatible" >> ../audit-results.md
            echo "license_status=compatible" >> $GITHUB_OUTPUT
          else
            echo "⚠️  License compatibility issues:" >> ../audit-results.md
            echo "" >> ../audit-results.md
            cat licenses.log >> ../audit-results.md || true
            echo "license_status=issues" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # Run cargo-deny for additional checks
      - name: Run cargo deny
        id: deny
        run: |
          cd src-tauri
          echo "" >> ../audit-results.md
          echo "## Dependency Policy Check (cargo-deny)" >> ../audit-results.md
          echo "" >> ../audit-results.md

          if cargo deny --log-level error check 2>&1 | tee deny.log; then
            echo "✅ All dependency policies passed" >> ../audit-results.md
            echo "deny_status=passed" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Dependency policy violations:" >> ../audit-results.md
            echo "" >> ../audit-results.md
            echo '```' >> ../audit-results.md
            cat deny.log >> ../audit-results.md || true
            echo '```' >> ../audit-results.md
            echo "deny_status=violations" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # Upload audit results as artifact
      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: rust-security-audit
          path: |
            audit-results.md
            src-tauri/audit.json
            src-tauri/licenses.log
            src-tauri/deny.log
          retention-days: 90

      # Comment on PR with results
      - name: Comment PR with audit results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'audit-results.md';

            if (fs.existsSync(path)) {
              const auditResults = fs.readFileSync(path, 'utf8');
              
              const comment = `
            ## 🛡️ Security Audit Results

            ${auditResults}

            ---
            <sub>This comment is automatically generated by the Security Audit workflow.</sub>
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

      # Fail job if critical security issues found
      - name: Check security status
        run: |
          if [[ "${{ steps.audit.outputs.security_status }}" == "vulnerabilities" ]]; then
            echo "❌ Critical security vulnerabilities found!"
            echo "Please review the audit results and update dependencies."
            exit 1
          fi

          if [[ "${{ steps.deny.outputs.deny_status }}" == "violations" ]]; then
            echo "⚠️  Dependency policy violations found!"
            echo "Please review the cargo-deny results."
            # Don't fail for deny violations, just warn
          fi

          echo "✅ Security audit completed successfully"

  # Frontend Security Audit (npm audit)
  frontend-security:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@8.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run npm audit
      - name: Run npm security audit
        id: npm-audit
        run: |
          echo "## Frontend Security Audit Results" > frontend-audit-results.md
          echo "" >> frontend-audit-results.md

          if pnpm audit --audit-level high --json > npm-audit.json 2>&1; then
            echo "✅ No high/critical security vulnerabilities found in frontend dependencies" >> frontend-audit-results.md
            echo "npm_security_status=clean" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Frontend security vulnerabilities detected:" >> frontend-audit-results.md
            echo "" >> frontend-audit-results.md
            pnpm audit --audit-level moderate >> frontend-audit-results.md || true
            echo "npm_security_status=vulnerabilities" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # Check for outdated packages
      - name: Check outdated packages
        run: |
          echo "" >> frontend-audit-results.md
          echo "## Outdated Packages" >> frontend-audit-results.md
          echo "" >> frontend-audit-results.md

          if pnpm outdated --long > outdated.txt 2>&1; then
            echo "✅ All packages are up to date" >> frontend-audit-results.md
          else
            echo "📦 Outdated packages found:" >> frontend-audit-results.md
            echo "" >> frontend-audit-results.md
            echo '```' >> frontend-audit-results.md
            head -20 outdated.txt >> frontend-audit-results.md || true
            echo '```' >> frontend-audit-results.md
          fi
        continue-on-error: true

      # Upload frontend audit results
      - name: Upload frontend audit results
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-audit
          path: |
            frontend-audit-results.md
            npm-audit.json
            outdated.txt
          retention-days: 90

      # Comment on PR with frontend results
      - name: Comment PR with frontend audit results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'frontend-audit-results.md';

            if (fs.existsSync(path)) {
              const auditResults = fs.readFileSync(path, 'utf8');
              
              const comment = `
            ## 🔍 Frontend Security Audit Results

            ${auditResults}

            ---
            <sub>This comment is automatically generated by the Security Audit workflow.</sub>
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  # CodeQL Analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@8.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm exec vite build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # SBOM Generation (Software Bill of Materials)
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@8.15.9 --activate

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Generate SBOM for Rust dependencies
      - name: Generate Rust SBOM
        run: |
          cd src-tauri
          cargo cyclonedx --format json --override-filename rust-sbom

      # Generate SBOM for Node.js dependencies
      - name: Generate Node.js SBOM
        run: |
          pnpm dlx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file nodejs-sbom.json
        continue-on-error: true

      # Combine SBOMs
      - name: Combine SBOMs
        run: |
          echo "Creating combined SBOM manifest..."
          cat > combined-sbom.json << EOF
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.4",
            "serialNumber": "urn:uuid:$(uuidgen)",
            "version": 1,
            "metadata": {
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "tools": [
                {
                  "vendor": "video-downloader-pro",
                  "name": "Security Audit Workflow",
                  "version": "1.0"
                }
              ],
              "component": {
                "type": "application",
                "name": "video-downloader-pro",
                "version": "${{ github.sha }}"
              }
            },
            "components": []
          }
          EOF

          echo "SBOM files generated:"
          ls -la *sbom.json

      # Upload SBOM artifacts
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          if-no-files-found: warn
          path: |
            src-tauri/rust-sbom.json
            nodejs-sbom.json
            combined-sbom.json
          retention-days: 90

      # Attest SBOM to release
      - name: Attest SBOM
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            src-tauri/rust-sbom.json
            nodejs-sbom.json

  # Security Summary
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [rust-security, frontend-security]
    if: always() && github.event_name != 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Download audit artifacts
        uses: actions/download-artifact@v4
        with:
          path: audit-results

      - name: Create security summary
        run: |
          echo "# 🛡️ Security Audit Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "**Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> security-summary.md
          echo "**Commit**: ${{ github.sha }}" >> security-summary.md
          echo "**Ref**: ${{ github.ref }}" >> security-summary.md
          echo "" >> security-summary.md

          echo "## Status Overview" >> security-summary.md
          echo "" >> security-summary.md
          echo "| Component | Status |" >> security-summary.md
          echo "|-----------|--------|" >> security-summary.md
          echo "| Rust Security | ${{ needs.rust-security.result }} |" >> security-summary.md
          echo "| Frontend Security | ${{ needs.frontend-security.result }} |" >> security-summary.md
          echo "" >> security-summary.md

          # Add recommendations
          echo "## Recommendations" >> security-summary.md
          echo "" >> security-summary.md
          echo "- 📅 Regular security audits are performed automatically" >> security-summary.md
          echo "- 🔄 Dependencies are monitored for vulnerabilities" >> security-summary.md
          echo "- 🛡️ CodeQL analysis provides additional security insights" >> security-summary.md
          echo "- 📋 SBOM is generated for supply chain transparency" >> security-summary.md

      - name: Upload security summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md
          retention-days: 90
