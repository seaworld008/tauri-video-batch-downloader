name: Continuous Integration

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.txt"
      - "LICENSE*"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.txt"
      - "LICENSE*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  preflight:
    name: Fast Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint code
        run: pnpm lint

      - name: Format check
        run: >
          pnpm exec prettier --check
          "src/**/*.{ts,tsx,css,json}"
          "*.html"
          ".github/workflows/*.yml"
          ".github/workflows/README.md"
          "README.md"
          "docs/**/*.md"

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm exec vitest run

      - name: Run integration tests
        run: pnpm exec vitest run --config vitest.config.integration.ts

  rust-static:
    name: Rust Static Checks
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: ./src-tauri

      - name: Prepare frontendDist placeholder
        run: |
          mkdir -p dist
          if [ ! -f dist/index.html ]; then
            printf '<!doctype html><html><body></body></html>\n' > dist/index.html
          fi

      - name: Prepare Linux sidecar placeholders
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          for name in yt-dlp ffmpeg deno; do
            path="src-tauri/binaries/${name}-x86_64-unknown-linux-gnu"
            if [ ! -f "$path" ]; then
              printf '#!/usr/bin/env sh\nexit 0\n' > "$path"
              chmod +x "$path"
            fi
          done

      - name: Run Rust clippy
        run: cargo clippy -- -D warnings
        working-directory: ./src-tauri

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: rust-static
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev

      - name: Prepare frontendDist placeholder
        run: |
          mkdir -p dist
          if [ ! -f dist/index.html ]; then
            printf '<!doctype html><html><body></body></html>\n' > dist/index.html
          fi

      - name: Prepare Linux sidecar placeholders
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          for name in yt-dlp ffmpeg deno; do
            path="src-tauri/binaries/${name}-x86_64-unknown-linux-gnu"
            if [ ! -f "$path" ]; then
              printf '#!/usr/bin/env sh\nexit 0\n' > "$path"
              chmod +x "$path"
            fi
          done

      - name: Run Rust tests
        run: cargo test
        working-directory: ./src-tauri

  build-smoke:
    name: Ubuntu Tauri Build Smoke
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm exec vite build

      - name: Prepare Linux sidecar placeholders
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          for name in yt-dlp ffmpeg deno; do
            path="src-tauri/binaries/${name}-x86_64-unknown-linux-gnu"
            if [ ! -f "$path" ]; then
              printf '#!/usr/bin/env sh\nexit 0\n' > "$path"
              chmod +x "$path"
            fi
          done

      - name: Build Tauri app (debug)
        run: pnpm tauri build --debug
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-ubuntu
          path: src-tauri/target/debug/bundle/
          retention-days: 3

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [preflight, frontend-tests, rust-static, backend-tests, build-smoke]
    if: always()

    steps:
      - name: Check all required jobs
        run: |
          echo "Preflight: ${{ needs.preflight.result }}"
          echo "Frontend tests: ${{ needs.frontend-tests.result }}"
          echo "Rust static checks: ${{ needs.rust-static.result }}"
          echo "Backend tests: ${{ needs.backend-tests.result }}"
          echo "Build smoke: ${{ needs.build-smoke.result }}"

          if [[ "${{ needs.preflight.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.frontend-tests.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.rust-static.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.build-smoke.result }}" != "success" && "${{ needs.build-smoke.result }}" != "skipped" ]]; then exit 1; fi

          echo "All required CI checks passed."
