name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build, for example v1.0.0"
        required: true
        type: string
      platforms:
        description: "Platforms to build"
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos
          - all
      publish:
        description: "Upload artifacts to a draft GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.tag || '' }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      tag: ${{ steps.release-meta.outputs.tag }}
      version: ${{ steps.release-meta.outputs.version }}
      prerelease: ${{ steps.release-meta.outputs.prerelease }}
      tag_body: ${{ steps.release-meta.outputs.tag_body }}
      matrix: ${{ steps.release-meta.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag '$TAG' does not exist. Create the tag before running release builds." >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          WINDOWS='{"key":"windows-x64","family":"windows","name":"Windows 10+ x64","os":"windows-latest","rust_targets":"x86_64-pc-windows-msvc","build_target":"x86_64-pc-windows-msvc","sidecar_targets":"x86_64-pc-windows-msvc"}'
          MACOS='{"key":"macos-universal","family":"macos","name":"macOS Universal","os":"macos-latest","rust_targets":"x86_64-apple-darwin,aarch64-apple-darwin","build_target":"universal-apple-darwin","sidecar_targets":"x86_64-apple-darwin,aarch64-apple-darwin"}'

          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.platforms }}" == "all" ]]; then
            MATRIX="[$WINDOWS,$MACOS]"
          elif [[ "${{ inputs.platforms }}" == "windows" ]]; then
            MATRIX="[$WINDOWS]"
          elif [[ "${{ inputs.platforms }}" == "macos" ]]; then
            MATRIX="[$MACOS]"
          else
            echo "Unsupported platforms value: ${{ inputs.platforms }}" >&2
            exit 1
          fi

          TAG_BODY="$(git tag -l --format='%(contents)' "$TAG")"
          if [[ -z "$TAG_BODY" ]]; then
            TAG_BODY="Release $TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          {
            echo "tag_body<<EOF"
            echo "$TAG_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint code
        run: pnpm lint

      - name: Format check
        run: >
          pnpm exec prettier --check
          "src/**/*.{ts,tsx,css,json}"
          "*.html"
          ".github/workflows/*.yml"
          ".github/workflows/README.md"
          "README.md"
          "docs/**/*.md"

      - name: Run frontend tests
        run: pnpm exec vitest run

      - name: Prepare frontendDist placeholder
        run: |
          mkdir -p dist
          if [ ! -f dist/index.html ]; then
            printf '<!doctype html><html><body></body></html>\n' > dist/index.html
          fi

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: ./src-tauri

      - name: Run Rust clippy
        run: cargo clippy -- -D warnings
        working-directory: ./src-tauri

      - name: Run Rust tests
        run: cargo test
        working-directory: ./src-tauri

  build-release:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    needs: preflight
    timeout-minutes: 80

    strategy:
      fail-fast: true
      matrix:
        platform: ${{ fromJson(needs.preflight.outputs.matrix) }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_targets }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.platform.build_target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm exec vite build

      - name: Prepare sidecar binaries
        shell: bash
        run: |
          IFS=',' read -ra targets <<< "${{ matrix.platform.sidecar_targets }}"
          for target in "${targets[@]}"; do
            pnpm sidecars:prepare -- --target "$target"
          done

      - name: Validate sidecar binaries
        shell: bash
        run: |
          IFS=',' read -ra targets <<< "${{ matrix.platform.sidecar_targets }}"
          args=()
          for target in "${targets[@]}"; do
            args+=(--target "$target")
          done
          node scripts/validate-sidecars.mjs "${args[@]}"

      - name: Import Windows certificate
        if: matrix.platform.family == 'windows'
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) {
            $cert = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
            [IO.File]::WriteAllBytes("certificate.p12", $cert)
            certutil -user -q -p $env:WINDOWS_CERTIFICATE_PASSWORD -importpfx certificate.p12
            Remove-Item certificate.p12
          } else {
            Write-Host "No Windows certificate provided, skipping code signing"
          }
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Import macOS certificate
        if: matrix.platform.family == 'macos'
        shell: bash
        run: |
          if [[ -n "$APPLE_CERTIFICATE" ]]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
            rm certificate.p12
          else
            echo "No Apple certificate provided, skipping code signing"
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.platform.build_target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Notarize macOS app
        if: matrix.platform.family == 'macos'
        shell: bash
        run: |
          if [[ -z "$APPLE_ID" ]]; then
            echo "No Apple ID provided, skipping notarization"
            exit 0
          fi

          xcrun notarytool submit src-tauri/target/${{ matrix.platform.build_target }}/release/bundle/dmg/*.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Collect Windows artifacts
        if: matrix.platform.family == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Get-ChildItem "src-tauri/target/${{ matrix.platform.build_target }}/release/bundle" -Recurse -Include *.msi,*.exe |
            ForEach-Object { Copy-Item $_.FullName artifacts/ }

      - name: Collect macOS artifacts
        if: matrix.platform.family == 'macos'
        shell: bash
        run: |
          mkdir -p artifacts
          find "src-tauri/target/${{ matrix.platform.build_target }}/release/bundle" -type f -name "*.dmg" -exec cp {} artifacts/ \;

      - name: Verify artifacts exist
        shell: bash
        run: |
          find artifacts -type f -maxdepth 1
          if [[ -z "$(find artifacts -type f -maxdepth 1)" ]]; then
            echo "No release artifacts were produced." >&2
            exit 1
          fi

      - name: Generate checksums (Windows)
        if: matrix.platform.family == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem artifacts -File |
            ForEach-Object { "$(Get-FileHash $_.FullName -Algorithm SHA256 | ForEach-Object Hash)  $($_.Name)" } |
            Set-Content artifacts/checksums.txt

      - name: Generate checksums (Unix)
        if: matrix.platform.family != 'windows'
        shell: bash
        run: |
          cd artifacts
          find . -maxdepth 1 -type f ! -name checksums.txt -print0 | sort -z | xargs -0 shasum -a 256 > checksums.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.key }}
          path: artifacts/*
          retention-days: 14

  publish-release:
    name: Publish Draft Release
    runs-on: ubuntu-latest
    needs: [preflight, build-release]
    if: needs.build-release.result == 'success' && (github.event_name == 'push' || inputs.publish)

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find release-artifacts -type f ! -name checksums.txt -exec cp {} release-assets/ \;
          {
            echo "# SHA256 Checksums"
            echo
            for checksum in $(find release-artifacts -name checksums.txt | sort); do
              echo "## ${checksum%/checksums.txt}"
              cat "$checksum"
              echo
            done
          } > release-assets/CHECKSUMS.txt

      - name: Upload assets to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: Video Downloader Pro ${{ needs.preflight.outputs.version }}
          draft: true
          prerelease: ${{ needs.preflight.outputs.prerelease }}
          files: release-assets/*
          body: |
            ## Video Downloader Pro ${{ needs.preflight.outputs.version }}

            Professional batch video downloader built with Tauri v2, Rust, React, and Zustand.

            ### Downloads

            - Windows 10+ x64: `.msi` or `.exe`
            - macOS Universal: `.dmg` for Apple Silicon and Intel Macs

            ### Checksums

            SHA256 checksums are attached in `CHECKSUMS.txt`.

            ### Changelog

            ${{ needs.preflight.outputs.tag_body }}

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [preflight, build-release, publish-release]
    if: always()

    steps:
      - name: Summarize release workflow
        run: |
          echo "Tag: ${{ needs.preflight.outputs.tag }}"
          echo "Build result: ${{ needs.build-release.result }}"
          echo "Publish result: ${{ needs.publish-release.result }}"
